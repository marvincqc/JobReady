<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StartJobReady — Build Your Resume</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0f4f8;
  --card: #ffffff;
  --accent: #2563eb;
  --accent-dark: #1d4ed8;
  --accent-light: #eff6ff;
  --text: #0f172a;
  --muted: #64748b;
  --border: #e2e8f0;
  --success: #16a34a;
  --success-light: #f0fdf4;
  --error: #dc2626;
  --error-light: #fef2f2;
  --radius: 14px;
  --shadow: 0 4px 24px rgba(0,0,0,0.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── Header ── */
.header {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo { display: flex; align-items: center; gap: 10px; }
.logo-icon {
  width: 36px; height: 36px;
  background: var(--accent);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.logo-name { font-weight: 700; font-size: 17px; letter-spacing: -0.3px; }
.lang-select {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 12px;
  font-family: inherit;
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  cursor: pointer;
  outline: none;
}

/* ── Progress ── */
.progress-wrap {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 12px 24px;
}
.progress-info {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 8px;
  font-weight: 500;
}
.progress-bar {
  height: 4px;
  background: var(--border);
  border-radius: 99px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 99px;
  transition: width 0.4s ease;
}

/* ── Main ── */
main {
  flex: 1;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 32px 16px 80px;
}

.wizard {
  width: 100%;
  max-width: 540px;
}

/* ── Step card ── */
.step-card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 36px 32px;
  animation: fadeUp 0.3s ease;
  display: none;
}
.step-card.active { display: block; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

.step-icon {
  width: 52px; height: 52px;
  background: var(--accent-light);
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px;
  margin-bottom: 20px;
}
.step-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 6px;
}
.step-q {
  font-size: 22px;
  font-weight: 700;
  line-height: 1.3;
  letter-spacing: -0.3px;
  margin-bottom: 8px;
}
.step-hint {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 24px;
  line-height: 1.5;
}

/* ── Input ── */
.field {
  width: 100%;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 13px 16px;
  font-family: inherit;
  font-size: 15px;
  color: var(--text);
  outline: none;
  transition: border-color 0.15s;
  background: #fff;
}
.field:focus { border-color: var(--accent); }
.field.error { border-color: var(--error); background: var(--error-light); }
.field-error {
  font-size: 12px;
  color: var(--error);
  margin-top: 6px;
  font-weight: 500;
  display: none;
}
.field-error.show { display: block; }

/* ── Options grid ── */
.opts-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 4px;
}
.opts-grid.single { grid-template-columns: 1fr; }

.opt-btn {
  background: #fff;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 12px 16px;
  font-family: inherit;
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  cursor: pointer;
  text-align: left;
  transition: all 0.15s;
  line-height: 1.3;
}
.opt-btn:hover { border-color: var(--accent); background: var(--accent-light); color: var(--accent); }
.opt-btn.selected { border-color: var(--accent); background: var(--accent); color: #fff; }

/* ── Multi-select done btn ── */
.multi-done {
  margin-top: 14px;
  width: 100%;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 13px;
  font-family: inherit;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s;
  display: none;
}
.multi-done:hover { background: var(--accent-dark); }
.multi-done.show { display: block; }

/* ── Nav buttons ── */
.nav {
  display: flex;
  gap: 10px;
  margin-top: 24px;
}
.btn-back {
  flex: 0 0 auto;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 13px 20px;
  font-family: inherit;
  font-size: 15px;
  font-weight: 600;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
}
.btn-back:hover { border-color: var(--text); color: var(--text); }
.btn-next {
  flex: 1;
  background: var(--accent);
  border: none;
  border-radius: 10px;
  padding: 13px;
  font-family: inherit;
  font-size: 15px;
  font-weight: 600;
  color: #fff;
  cursor: pointer;
  transition: background 0.15s;
}
.btn-next:hover { background: var(--accent-dark); }
.btn-next:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }

/* ── Review card ── */
.review-section { margin-bottom: 20px; }
.review-section-title {
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}
.review-row {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--bg);
  cursor: pointer;
  border-radius: 6px;
  padding-left: 4px;
  transition: background 0.1s;
}
.review-row:hover { background: var(--bg); }
.review-row:last-child { border-bottom: none; }
.review-ic { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
.review-lb { font-size: 11px; color: var(--muted); font-weight: 500; min-width: 90px; margin-top: 2px; }
.review-val { flex: 1; font-size: 14px; font-weight: 500; line-height: 1.4; }
.review-edit { font-size: 12px; color: var(--accent); font-weight: 500; flex-shrink: 0; }

/* ── Submit btn ── */
.btn-submit {
  width: 100%;
  background: var(--success);
  border: none;
  border-radius: 10px;
  padding: 15px;
  font-family: inherit;
  font-size: 16px;
  font-weight: 700;
  color: #fff;
  cursor: pointer;
  margin-top: 24px;
  transition: background 0.15s;
}
.btn-submit:hover { background: #15803d; }
.btn-submit:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }

/* ── Success screen ── */
.success-screen {
  text-align: center;
  padding: 20px 0;
}
.success-icon {
  font-size: 56px;
  margin-bottom: 20px;
  display: block;
}
.success-title {
  font-size: 26px;
  font-weight: 700;
  letter-spacing: -0.5px;
  margin-bottom: 12px;
}
.success-msg {
  font-size: 15px;
  color: var(--muted);
  line-height: 1.6;
}

/* ── Loading overlay ── */
.loading {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(4px);
  z-index: 200;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 16px;
}
.loading.show { display: flex; }
.spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-msg { font-size: 15px; font-weight: 500; color: var(--muted); }

@media (max-width: 480px) {
  .step-card { padding: 24px 20px; }
  .step-q { font-size: 19px; }
  .opts-grid { grid-template-columns: 1fr; }
}
</style>
</head>

    errPhone:"देश कोड के साथ सही नंबर दर्ज करें।", errEmail:"सही ईमेल दर्ज करें।",
    errSalary:"संख्या दर्ज करें, जैसे 1800", errDate:"तारीख दर्ज करें, जैसे Jan 2022 – Mar 2024",
  },
  bn: {
    stepOf:(a,b)=>`ধাপ ${a} / ${b}`,
    back:"← ফিরে যান", next:"চালিয়ে যান →", submit:"Resume জমা দিন ✓",
    submitting:"আপনার resume জমা দেওয়া হচ্ছে...",
    editHint:"সম্পাদনা করতে যেকোনো ক্ষেত্রে ট্যাপ করুন",
    reviewTitle:"আপনার Resume পর্যালোচনা করুন",
    reviewHint:"জমা দেওয়ার আগে সব কিছু সাবধানে পরীক্ষা করুন।",
    naBtn:"প্রযোজ্য নয় / এড়িয়ে যান", doneBtn:"সম্পন্ন — পরবর্তী ধাপ →",
    successTitle:(name)=>`ধন্যবাদ, ${name}! 🎉`,
    successMsg:(agency)=>`আপনার resume সফলভাবে ${agency}-এ জমা দেওয়া হয়েছে।\n\nশুভকামনা! 🙏`,
    errRequired:"এই ক্ষেত্রটি প্রয়োজন।", errDob:"সঠিক তারিখ দিন। উদাহরণ: 15 Jan 1990",
    errPhone:"দেশের কোড সহ সঠিক নম্বর দিন।", errEmail:"সঠিক ইমেইল দিন।",
    errSalary:"সংখ্যা দিন, যেমন 1800", errDate:"তারিখ দিন, যেমন Jan 2022 – Mar 2024",
  },
};

// ── State ─────────────────────────────────────────────────────────────────────
let lang = "en";
let currentStep = 0;
let data = {};
let editingKey = null;

function t(key, ...args) {
  const L = TR[lang] ?? TR.en;
  const v = L[key] ?? TR.en[key];
  return typeof v === "function" ? v(...args) : v;
}

function getSteps() { return TR.en.steps; } // always use English step definitions

// ── Validation ────────────────────────────────────────────────────────────────
function validateField(type, value) {
  if (!value || !value.trim()) return null; // handled separately
  switch(type) {
    case "dob": {
      const ok = /^\d{1,2}[\s\/\-][A-Za-z\d]{1,9}[\s\/\-]\d{4}$/.test(value.trim()) || /^\d{4}[\-\/]\d{1,2}[\-\/]\d{1,2}$/.test(value.trim());
      if (!ok) return t("errDob");
      const yr = value.match(/\d{4}/);
      if (yr) { const y=parseInt(yr[0]); if(y<1920||y>new Date().getFullYear()-10) return t("errDob"); }
      return null;
    }
    case "phone": { const d=value.replace(/\D/g,""); return (d.length<7||d.length>15)?t("errPhone"):null; }
    case "email": return !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value)?t("errEmail"):null;
    case "salary": return !/\d/.test(value)?t("errSalary"):null;
    case "daterange": return (/present|current|now/i.test(value)||/\d{4}/.test(value))?null:t("errDate");
    default: return null;
  }
}

// ── Render wizard ─────────────────────────────────────────────────────────────
function render() {
  const steps = getSteps();
  const total = steps.length + 1; // +1 for review
  const isReview = currentStep >= steps.length;

  // Progress
  const pct = Math.round((currentStep / total) * 100);
  document.getElementById("progressFill").style.width = pct + "%";
  document.getElementById("stepPct").textContent = pct + "%";
  document.getElementById("stepLabel").textContent = isReview
    ? t("reviewTitle")
    : t("stepOf", currentStep + 1, steps.length);
  document.getElementById("progressWrap").style.display = isReview ? "none" : "";

  if (isReview) { renderReview(); return; }

  const s = steps[currentStep];
  const val = data[s.k] ?? "";

  const wizard = document.getElementById("wizard");
  wizard.innerHTML = "";

  const card = document.createElement("div");
  card.className = "step-card active";

  let inner = `
    <div class="step-icon">${s.ic}</div>
    <div class="step-label">${s.label}</div>
    <div class="step-q">${s.q}</div>
    ${s.hint ? `<div class="step-hint">${s.hint}</div>` : ""}
  `;

  if (s.type === "text") {
    inner += `
      <input class="field" id="mainField" type="text" placeholder="${s.ph ?? ""}" value="${escHtml(val)}" />
      <div class="field-error" id="fieldErr"></div>
    `;
    if (s.optional) {
      inner += `<div style="margin-top:10px;"><button class="opt-btn" style="width:100%;text-align:center;color:var(--muted);" onclick="skipField()">${t("naBtn")}</button></div>`;
    }
    inner += `<div class="nav">
      ${currentStep > 0 ? `<button class="btn-back" onclick="goBack()">${t("back")}</button>` : ""}
      <button class="btn-next" onclick="goNext()">${t("next")}</button>
    </div>`;
  } else if (s.type === "opts") {
    const cols = s.opts.length <= 3 ? "single" : "";
    inner += `<div class="opts-grid ${cols}" id="optsGrid">`;
    s.opts.forEach(o => {
      const sel = val === o ? "selected" : "";
      inner += `<button class="opt-btn ${sel}" onclick="selectOpt(this,'${escHtml(o)}')">${o}</button>`;
    });
    inner += `</div>`;
    if (s.optional) inner += `<button class="opt-btn" style="width:100%;margin-top:10px;text-align:center;color:var(--muted);" onclick="skipField()">${t("naBtn")}</button>`;
    inner += `<div class="nav">
      ${currentStep > 0 ? `<button class="btn-back" onclick="goBack()">${t("back")}</button>` : ""}
      <button class="btn-next" id="nextBtn" ${!val?'disabled':''} onclick="goNext()">${t("next")}</button>
    </div>`;
  } else if (s.type === "multi") {
    const selected = val ? val.split(", ").filter(Boolean) : [];
    inner += `<div class="opts-grid" id="optsGrid">`;
    s.opts.forEach(o => {
      const sel = selected.includes(o) ? "selected" : "";
      inner += `<button class="opt-btn ${sel}" onclick="toggleMulti(this,'${escHtml(o)}')">${o}</button>`;
    });
    inner += `</div>`;
    inner += `<button class="multi-done ${selected.length>0?'show':''}" id="doneBtn" onclick="goNext()">${t("doneBtn")}</button>`;
    inner += `<div class="nav">
      ${currentStep > 0 ? `<button class="btn-back" onclick="goBack()">${t("back")}</button>` : ""}
    </div>`;
  }

  card.innerHTML = inner;
  wizard.appendChild(card);

  // Focus text input
  if (s.type === "text") {
    setTimeout(() => document.getElementById("mainField")?.focus(), 100);
    document.getElementById("mainField")?.addEventListener("keydown", e => { if(e.key==="Enter") goNext(); });
  }
}

function renderReview() {
  const steps = getSteps();
  const wizard = document.getElementById("wizard");
  wizard.innerHTML = "";
  const card = document.createElement("div");
  card.className = "step-card active";

  const sections = [
    { title: TR.en.reviewSections.personal, keys: ["agency","name","dob","nationality","country","city","phone","email"] },
    { title: TR.en.reviewSections.job,      keys: ["jobType","workArrange","availability","salary","experience"] },
    { title: TR.en.reviewSections.experience, keys: ["job1Title","job1Company","job1Dates","job2Title","job2Company","job2Dates","job3Title","job3Company","job3Dates"] },
    { title: TR.en.reviewSections.skills,   keys: ["skills","certs","education","languages"] },
  ];

  let html = `
    <div class="step-icon">📋</div>
    <div class="step-q">${t("reviewTitle")}</div>
    <div class="step-hint">${t("reviewHint")} ${t("editHint")}</div>
  `;

  sections.forEach(sec => {
    const rows = sec.keys.map(k => {
      const s = steps.find(x=>x.k===k);
      if (!s) return "";
      const v = data[k];
      if (!v && s.optional) return "";
      return `<div class="review-row" onclick="editField('${k}')">
        <span class="review-ic">${s.ic}</span>
        <span class="review-lb">${s.label}</span>
        <span class="review-val">${escHtml(v||"—")}</span>
        <span class="review-edit">Edit</span>
      </div>`;
    }).join("");
    if (!rows.trim()) return;
    html += `<div class="review-section">
      <div class="review-section-title">${sec.title}</div>
      ${rows}
    </div>`;
  });

  html += `<button class="btn-submit" onclick="submitResume()">${t("submit")}</button>`;
  html += `<div class="nav"><button class="btn-back" onclick="goBack()">${t("back")}</button></div>`;

  card.innerHTML = html;
  wizard.appendChild(card);
}

// ── Actions ───────────────────────────────────────────────────────────────────
function selectOpt(btn, val) {
  btn.closest(".opts-grid").querySelectorAll(".opt-btn").forEach(b => b.classList.remove("selected"));
  btn.classList.add("selected");
  const s = getSteps()[currentStep];
  data[s.k] = val;
  const nb = document.getElementById("nextBtn");
  if (nb) nb.disabled = false;
}

function toggleMulti(btn, val) {
  btn.classList.toggle("selected");
  const s = getSteps()[currentStep];
  const selected = Array.from(btn.closest(".opts-grid").querySelectorAll(".opt-btn.selected")).map(b => b.textContent.trim());
  data[s.k] = selected.join(", ");
  const db = document.getElementById("doneBtn");
  if (db) { db.classList.toggle("show", selected.length > 0); }
}

function skipField() {
  const s = getSteps()[currentStep];
  data[s.k] = "";
  advance();
}

function goNext() {
  const steps = getSteps();
  if (currentStep >= steps.length) return;
  const s = steps[currentStep];

  if (s.type === "text") {
    const field = document.getElementById("mainField");
    const val = field?.value.trim() ?? "";
    const errEl = document.getElementById("fieldErr");

    if (!val && !s.optional) { showErr(errEl, t("errRequired")); return; }
    if (val && s.validate) {
      const err = validateField(s.validate, val);
      if (err) { showErr(errEl, err); return; }
    }
    data[s.k] = val;
  } else if (s.type === "multi") {
    if (!data[s.k] || !data[s.k].trim()) return;
  } else if (s.type === "opts") {
    if (!data[s.k]) return;
  }

  if (editingKey) { editingKey = null; currentStep = steps.length; render(); return; }
  advance();
}

function advance() {
  const steps = getSteps();
  currentStep++;
  // Skip job2/job3 company+dates if title is blank
  while (currentStep < steps.length) {
    const s = steps[currentStep];
    if (s.k === "job2Company" || s.k === "job2Dates") {
      if (!data["job2Title"]) { currentStep++; continue; }
    }
    if (s.k === "job3Title" && !data["job2Title"]) { currentStep++; continue; }
    if (s.k === "job3Company" || s.k === "job3Dates") {
      if (!data["job3Title"]) { currentStep++; continue; }
    }
    break;
  }
  render();
  window.scrollTo(0,0);
}

function goBack() {
  if (editingKey) { editingKey = null; currentStep = getSteps().length; render(); return; }
  if (currentStep > 0) { currentStep--; render(); window.scrollTo(0,0); }
}

function editField(key) {
  const steps = getSteps();
  const idx = steps.findIndex(s => s.k === key);
  if (idx < 0) return;
  editingKey = key;
  currentStep = idx;
  render();
  window.scrollTo(0,0);
}

function showErr(el, msg) {
  el.textContent = msg;
  el.classList.add("show");
  document.querySelector(".field")?.classList.add("error");
}

function changeLang(l) {
  lang = l;
  render();
}

// ── Submit ─────────────────────────────────────────────────────────────────────
async function submitResume() {
  const btn = document.querySelector(".btn-submit");
  if (btn) btn.disabled = true;

  const loadingEl = document.getElementById("loading");
  const loadingMsg = document.getElementById("loadingMsg");
  loadingMsg.textContent = t("submitting");
  loadingEl.classList.add("show");

  try {
    const res = await fetch("/submit", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ data, lang }),
    });
    const json = await res.json();
    loadingEl.classList.remove("show");
    if (json.ok) {
      showSuccess();
    } else {
      alert("Submission failed: " + (json.error || "Unknown error"));
      if (btn) btn.disabled = false;
    }
  } catch(err) {
    loadingEl.classList.remove("show");
    alert("Network error. Please try again.");
    if (btn) btn.disabled = false;
  }
}

function showSuccess() {
  document.getElementById("progressWrap").style.display = "none";
  const wizard = document.getElementById("wizard");
  wizard.innerHTML = "";
  const card = document.createElement("div");
  card.className = "step-card active";
  card.innerHTML = `
    <div class="success-screen">
      <span class="success-icon">🎉</span>
      <div class="success-title">${t("successTitle", data.name?.split(" ")[0] || "")}</div>
      <div class="success-msg">${t("successMsg", data.agency || "the agency").replace(/\n/g,"<br>")}</div>
    </div>
  `;
  wizard.appendChild(card);
}

function escHtml(str) {
  return String(str ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ── Init ──────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
