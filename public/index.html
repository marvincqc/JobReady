<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JobReady — Build Your Resume</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0f4f8;
  --card: #ffffff;
  --accent: #2563eb;
  --accent-dark: #1d4ed8;
  --accent-light: #eff6ff;
  --text: #0f172a;
  --muted: #64748b;
  --border: #e2e8f0;
  --success: #16a34a;
  --success-light: #f0fdf4;
  --error: #dc2626;
  --error-light: #fef2f2;
  --radius: 14px;
  --shadow: 0 4px 24px rgba(0,0,0,0.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── Header ── */
.header {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo { display: flex; align-items: center; gap: 10px; }
.logo-icon {
  width: 36px; height: 36px;
  background: var(--accent);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
.logo-name { font-weight: 700; font-size: 17px; letter-spacing: -0.3px; }
.lang-select {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 12px;
  font-family: inherit;
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  cursor: pointer;
  outline: none;
}
.header-actions {
  display: flex;
  align-items: center;
  gap: 10px;
}
.import-btn {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 12px;
  font-family: inherit;
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  cursor: pointer;
  transition: all 0.15s;
}
.import-btn:hover {
  border-color: var(--accent);
  background: var(--accent-light);
  color: var(--accent);
}
.import-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

/* ── Progress ── */
.progress-wrap {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 12px 24px;
}
.progress-info {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 8px;
  font-weight: 500;
}
.progress-bar {
  height: 4px;
  background: var(--border);
  border-radius: 99px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 99px;
  transition: width 0.4s ease;
}
.ocr-status {
  display: none;
  max-width: 540px;
  margin: 0 auto 12px;
  padding: 10px 14px;
  border-radius: 12px;
  border: 1px solid #f0d59a;
  background: #fff7e6;
  color: #7c4a00;
  font-size: 13px;
  line-height: 1.5;
}
.ocr-status.show { display: block; }
.ocr-status.error {
  border-color: #f7b2b2;
  background: #fff1f1;
  color: #9f1239;
}
.ocr-status.success {
  border-color: #b7e4c7;
  background: #f0fff4;
  color: #166534;
}

/* ── Main ── */
main {
  flex: 1;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 32px 16px 80px;
}

.wizard {
  width: 100%;
  max-width: 540px;
}

/* ── Step card ── */
.step-card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 36px 32px;
  animation: fadeUp 0.3s ease;
  display: none;
}
.step-card.active { display: block; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

.step-icon {
  width: 52px; height: 52px;
  background: var(--accent-light);
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px;
  margin-bottom: 20px;
}
.step-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 6px;
}
.step-q {
  font-size: 22px;
  font-weight: 700;
  line-height: 1.3;
  letter-spacing: -0.3px;
  margin-bottom: 8px;
}
.step-hint {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 24px;
  line-height: 1.5;
}

/* ── Input ── */
.field {
  width: 100%;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 13px 16px;
  font-family: inherit;
  font-size: 15px;
  color: var(--text);
  outline: none;
  transition: border-color 0.15s;
  background: #fff;
}
.field:focus { border-color: var(--accent); }
.field.error { border-color: var(--error); background: var(--error-light); }
.field:disabled { opacity: 0.65; cursor: not-allowed; background: #f8fafc; }
.field-error {
  font-size: 12px;
  color: var(--error);
  margin-top: 6px;
  font-weight: 500;
  display: none;
}
.field-error.show { display: block; }
.upload-zone {
  border: 1.5px dashed var(--border);
  border-radius: 14px;
  background: linear-gradient(180deg, #ffffff 0%, #fbfdff 100%);
  padding: 22px;
  transition: all 0.15s ease;
  cursor: pointer;
}
.upload-zone:hover,
.upload-zone.dragover {
  border-color: var(--accent);
  background: var(--accent-light);
}
.upload-zone-head {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  margin-bottom: 16px;
}
.upload-zone-ic {
  width: 44px;
  height: 44px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #fff;
  border: 1px solid var(--border);
  flex-shrink: 0;
  font-size: 20px;
}
.upload-zone-title {
  font-size: 16px;
  font-weight: 700;
  letter-spacing: -0.2px;
  margin-bottom: 4px;
}
.upload-zone-copy {
  font-size: 13px;
  color: var(--muted);
  line-height: 1.5;
}
.upload-zone-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 16px;
}
.upload-zone-btn {
  border: 1px solid var(--border);
  background: #fff;
  color: var(--text);
  border-radius: 10px;
  padding: 10px 14px;
  font-family: inherit;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
}
.upload-zone-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: #fff;
}
.upload-note {
  margin-top: 12px;
  font-size: 12px;
  color: var(--muted);
}
.attachment-list {
  margin-top: 14px;
  display: grid;
  gap: 10px;
}
.attachment-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 12px 14px;
  border: 1px solid var(--border);
  border-radius: 12px;
  background: #fff;
}
.attachment-meta {
  min-width: 0;
}
.attachment-name {
  font-size: 14px;
  font-weight: 600;
  line-height: 1.35;
  word-break: break-word;
}
.attachment-info {
  font-size: 12px;
  color: var(--muted);
  margin-top: 3px;
}
.attachment-remove {
  border: none;
  background: transparent;
  color: var(--error);
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  flex-shrink: 0;
}
.attachment-empty {
  padding: 12px 0 4px;
  font-size: 13px;
  color: var(--muted);
}
.control-group {
  margin-bottom: 12px;
}
.control-label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 6px;
}
.range-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.range-present {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 8px;
  font-size: 13px;
  color: var(--muted);
}

/* ── Options grid ── */
.opts-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 4px;
}
.opts-grid.single { grid-template-columns: 1fr; }

.opt-btn {
  background: #fff;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 12px 16px;
  font-family: inherit;
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  cursor: pointer;
  text-align: left;
  transition: all 0.15s;
  line-height: 1.3;
}
.opt-btn:hover { border-color: var(--accent); background: var(--accent-light); color: var(--accent); }
.opt-btn.selected { border-color: var(--accent); background: var(--accent); color: #fff; }

/* ── Multi-select done btn ── */
.multi-done {
  margin-top: 14px;
  width: 100%;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 13px;
  font-family: inherit;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s;
  display: none;
}
.multi-done:hover { background: var(--accent-dark); }
.multi-done.show { display: block; }

/* ── Nav buttons ── */
.nav {
  display: flex;
  gap: 10px;
  margin-top: 24px;
}
.btn-back {
  flex: 0 0 auto;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 13px 20px;
  font-family: inherit;
  font-size: 15px;
  font-weight: 600;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
}
.btn-back:hover { border-color: var(--text); color: var(--text); }
.btn-next {
  flex: 1;
  background: var(--accent);
  border: none;
  border-radius: 10px;
  padding: 13px;
  font-family: inherit;
  font-size: 15px;
  font-weight: 600;
  color: #fff;
  cursor: pointer;
  transition: background 0.15s;
}
.btn-next:hover { background: var(--accent-dark); }
.btn-next:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }

/* ── Review card ── */
.review-section { margin-bottom: 20px; }
.review-section-title {
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}
.review-row {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--bg);
  cursor: pointer;
  border-radius: 6px;
  padding-left: 4px;
  transition: background 0.1s;
}
.review-row:hover { background: var(--bg); }
.review-row:last-child { border-bottom: none; }
.review-ic { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
.review-lb { font-size: 11px; color: var(--muted); font-weight: 500; min-width: 90px; margin-top: 2px; }
.review-val { flex: 1; font-size: 14px; font-weight: 500; line-height: 1.4; }
.review-edit { font-size: 12px; color: var(--accent); font-weight: 500; flex-shrink: 0; }

/* ── Submit btn ── */
.btn-submit {
  width: 100%;
  background: var(--success);
  border: none;
  border-radius: 10px;
  padding: 15px;
  font-family: inherit;
  font-size: 16px;
  font-weight: 700;
  color: #fff;
  cursor: pointer;
  margin-top: 24px;
  transition: background 0.15s;
}
.btn-submit:hover { background: #15803d; }
.btn-submit:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }

/* ── Success screen ── */
.success-screen {
  text-align: center;
  padding: 20px 0;
}
.success-icon {
  font-size: 56px;
  margin-bottom: 20px;
  display: block;
}
.success-title {
  font-size: 26px;
  font-weight: 700;
  letter-spacing: -0.5px;
  margin-bottom: 12px;
}
.success-msg {
  font-size: 15px;
  color: var(--muted);
  line-height: 1.6;
}
.success-links {
  display: grid;
  gap: 10px;
  margin-top: 20px;
}
.success-link {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 12px 14px;
  border-radius: 10px;
  background: var(--accent);
  color: #fff;
  font-size: 14px;
  font-weight: 700;
  text-decoration: none;
}
.success-link.secondary {
  background: #fff;
  color: var(--text);
  border: 1px solid var(--border);
}
.success-link:hover { background: var(--accent-dark); }
.success-link.secondary:hover { background: var(--bg); }

/* ── Loading overlay ── */
.loading {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(4px);
  z-index: 200;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 16px;
}
.loading.show { display: flex; }
.spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-msg { font-size: 15px; font-weight: 500; color: var(--muted); }

@media (max-width: 480px) {
  .step-card { padding: 24px 20px; }
  .step-q { font-size: 19px; }
  .opts-grid { grid-template-columns: 1fr; }
  .range-grid { grid-template-columns: 1fr; }
  .header {
    gap: 12px;
    align-items: flex-start;
    flex-direction: column;
  }
  .header-actions {
    width: 100%;
    justify-content: space-between;
  }
}
</style>
</head>

<div class="header">
  <div class="logo">
    <div class="logo-icon">📋</div>
    <div class="logo-name">JobReady</div>
  </div>
  <div class="header-actions">
    <button class="import-btn" id="importBtn" type="button" onclick="openOcrImport()">Import resume</button>
    <select class="lang-select" id="langSel" onchange="changeLang(this.value)">
      <option value="en">🇬🇧 English</option>
      <option value="zh">🇨🇳 中文</option>
      <option value="ms">🇲🇾 Melayu</option>
      <option value="ta">🇮🇳 தமிழ்</option>
      <option value="hi">🇮🇳 हिन्दी</option>
      <option value="bn">🇧🇩 বাংলা</option>
    </select>
  </div>
</div>

<div class="progress-wrap" id="progressWrap">
  <div class="progress-info">
    <span id="stepLabel">Step 1 of 20</span>
    <span id="stepPct">0%</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
</div>

<div class="ocr-status" id="ocrStatus"></div>

<main>
  <div class="wizard" id="wizard"></div>
</main>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <div class="loading-msg" id="loadingMsg">Generating your resume...</div>
</div>

<input type="file" id="ocrFile" accept="image/*" hidden>

// ── State ─────────────────────────────────────────────────────────────────────
const STORAGE_KEY = "startjobready:wizard:v2";
const MONTH_NAMES = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

let lang = "en";
let currentStep = 0;
let data = {};
let editingKey = null;
let lastSubmitResult = null;
let attachments = [];

function t(key, ...args) {
  const L = TR[lang] ?? TR.en;
  const v = L[key] ?? TR.en[key];
  return typeof v === "function" ? v(...args) : v;
}

function getSteps() { return TR.en.steps; } // always use English step definitions

function persistDraft() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      lang,
      currentStep,
      data,
    }));
  } catch (_) {}
}

function restoreDraft() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const saved = JSON.parse(raw);
    if (!saved || typeof saved !== "object") return;
    if (saved.lang && TR[saved.lang]) lang = saved.lang;
    if (Number.isInteger(saved.currentStep)) currentStep = saved.currentStep;
    if (saved.data && typeof saved.data === "object") data = saved.data;
  } catch (_) {}
}

function clearDraft() {
  try {
    localStorage.removeItem(STORAGE_KEY);
  } catch (_) {}
}

function pad2(n) {
  return String(n).padStart(2, "0");
}

function monthNumberToName(n) {
  return MONTH_NAMES[n - 1] || "";
}

function monthNameToNumber(name) {
  const value = String(name ?? "").trim().toLowerCase();
  const short = value.slice(0, 3);
  const idx = MONTH_NAMES.findIndex(m => m.toLowerCase() === short);
  return idx >= 0 ? idx + 1 : null;
}

function parseDateParts(value) {
  const v = String(value ?? "").trim();
  if (!v) return null;

  let match = v.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (match) {
    const year = Number(match[1]);
    const month = Number(match[2]);
    const day = Number(match[3]);
    return { year, month, day };
  }

  match = v.match(/^(\d{1,2})[\s\/\-]([A-Za-z]{3,9}|\d{1,2})[\s\/\-](\d{4})$/);
  if (match) {
    const day = Number(match[1]);
    const monthToken = match[2];
    const month = /^\d+$/.test(monthToken) ? Number(monthToken) : monthNameToNumber(monthToken);
    const year = Number(match[3]);
    if (!month) return null;
    return { year, month, day };
  }

  match = v.match(/^([A-Za-z]{3,9})[\s\/\-](\d{1,2})[\s\/\-](\d{4})$/);
  if (match) {
    const month = monthNameToNumber(match[1]);
    const day = Number(match[2]);
    const year = Number(match[3]);
    if (!month) return null;
    return { year, month, day };
  }

  return null;
}

function formatDateDisplay(value) {
  const parts = parseDateParts(value);
  if (!parts) return String(value ?? "").trim();
  return `${parts.day} ${monthNumberToName(parts.month)} ${parts.year}`;
}

function toDateInputValue(value) {
  const parts = parseDateParts(value);
  if (!parts) return "";
  return `${parts.year}-${pad2(parts.month)}-${pad2(parts.day)}`;
}

function validateCalendarDate(value) {
  const parts = parseDateParts(value);
  if (!parts) return false;
  const dt = new Date(parts.year, parts.month - 1, parts.day);
  return dt.getFullYear() === parts.year && dt.getMonth() + 1 === parts.month && dt.getDate() === parts.day;
}

function parseMonthInputValue(value) {
  const match = String(value ?? "").trim().match(/^(\d{4})-(\d{2})$/);
  if (!match) return null;
  const year = Number(match[1]);
  const month = Number(match[2]);
  if (!year || month < 1 || month > 12) return null;
  return { year, month };
}

function formatMonthInput(value) {
  const parts = parseMonthInputValue(value);
  if (!parts) return "";
  return `${monthNumberToName(parts.month)} ${parts.year}`;
}

function parseMonthRangeDisplay(value) {
  const v = String(value ?? "").trim();
  if (!v) return { start: "", end: "", present: false };
  const match = v.match(/^([A-Za-z]{3,9})\s+(\d{4})\s*[–-]\s*(Present|Current|Now|([A-Za-z]{3,9})\s+(\d{4}))$/i);
  if (!match) return { start: "", end: "", present: false };
  const startMonth = monthNameToNumber(match[1]);
  const startYear = Number(match[2]);
  if (!startMonth || !startYear) return { start: "", end: "", present: false };

  if (/present|current|now/i.test(match[3])) {
    return { start: `${startYear}-${pad2(startMonth)}`, end: "", present: true };
  }

  const endMonth = monthNameToNumber(match[4]);
  const endYear = Number(match[5]);
  if (!endMonth || !endYear) return { start: "", end: "", present: false };
  return {
    start: `${startYear}-${pad2(startMonth)}`,
    end: `${endYear}-${pad2(endMonth)}`,
    present: false,
  };
}

function formatMonthRangeDisplay(startValue, endValue, present) {
  const start = parseMonthInputValue(startValue);
  if (!start) return "";
  const startLabel = `${monthNumberToName(start.month)} ${start.year}`;
  if (present) return `${startLabel} – Present`;
  const end = parseMonthInputValue(endValue);
  if (!end) return "";
  return `${startLabel} – ${monthNumberToName(end.month)} ${end.year}`;
}

function setStatusMessage(message, kind = "info") {
  const el = document.getElementById("ocrStatus");
  if (!el) return;
  if (!message) {
    el.className = "ocr-status";
    el.textContent = "";
    return;
  }
  el.className = `ocr-status show${kind === "error" ? " error" : kind === "success" ? " success" : ""}`;
  el.textContent = message;
}

function setDraftValue(key, value) {
  data[key] = value;
  persistDraft();
}

function makeId() {
  if (window.crypto?.randomUUID) return crypto.randomUUID();
  return `att_${Date.now().toString(36)}_${Math.random().toString(36).slice(2, 8)}`;
}

function formatFileSize(bytes) {
  if (!Number.isFinite(bytes)) return "";
  if (bytes < 1024) return `${bytes} B`;
  if (bytes < 1024 * 1024) return `${Math.round(bytes / 1024)} KB`;
  return `${(bytes / (1024 * 1024)).toFixed(1)} MB`;
}

function allowedAttachmentMime(file) {
  const name = String(file?.name ?? "").toLowerCase();
  const mime = String(file?.type ?? "").toLowerCase();
  return (
    mime.startsWith("image/") ||
    mime === "application/pdf" ||
    name.endsWith(".pdf") ||
    name.endsWith(".jpg") ||
    name.endsWith(".jpeg") ||
    name.endsWith(".png") ||
    name.endsWith(".webp") ||
    name.endsWith(".gif") ||
    name.endsWith(".heic") ||
    name.endsWith(".doc") ||
    name.endsWith(".docx") ||
    name.endsWith(".txt") ||
    name.endsWith(".rtf")
  );
}

function attachmentKey(file) {
  return `${file.name}|${file.size}|${file.lastModified || 0}`;
}

async function addAttachments(fileList) {
  const files = Array.from(fileList || []);
  if (!files.length) return [];

  const existing = new Set(attachments.map(item => item.key));
  const added = [];

  for (const file of files) {
    const key = attachmentKey(file);
    if (existing.has(key)) continue;
    if (!allowedAttachmentMime(file)) continue;

    const item = {
      id: makeId(),
      key,
      name: file.name,
      type: file.type || "application/octet-stream",
      size: file.size || 0,
      file,
    };
    attachments.push(item);
    added.push(item);
    existing.add(key);
  }

  persistDraft();
  return added;
}

function removeAttachment(id) {
  attachments = attachments.filter(item => item.id !== id);
  persistDraft();
  render();
}

function clearAttachments() {
  attachments = [];
  persistDraft();
  render();
}

// ── Validation ────────────────────────────────────────────────────────────────
function validateField(type, value) {
  if (!value || !value.trim()) return null; // handled separately
  switch(type) {
    case "dob": {
      const parts = parseDateParts(value);
      if (!parts || !validateCalendarDate(value)) return t("errDob");
      const currentYear = new Date().getFullYear();
      if (parts.year < 1920 || parts.year > currentYear - 10) return t("errDob");
      return null;
    }
    case "phone": { const d=value.replace(/\D/g,""); return (d.length<7||d.length>15)?t("errPhone"):null; }
    case "email": return !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value)?t("errEmail"):null;
    case "salary": return !/\d/.test(value)?t("errSalary"):null;
    case "daterange": {
      const parsed = parseMonthRangeDisplay(value);
      if (parsed.start) return null;
      return (/present|current|now/i.test(value) || /\d{4}/.test(value)) ? null : t("errDate");
    }
    default: return null;
  }
}

// ── Render wizard ─────────────────────────────────────────────────────────────
function render() {
  const steps = getSteps();
  const total = steps.length + 1; // +1 for review
  const isReview = currentStep >= steps.length;

  // Progress
  const pct = Math.round((currentStep / total) * 100);
  document.getElementById("progressFill").style.width = pct + "%";
  document.getElementById("stepPct").textContent = pct + "%";
  document.getElementById("stepLabel").textContent = isReview
    ? t("reviewTitle")
    : t("stepOf", currentStep + 1, steps.length);
  document.getElementById("progressWrap").style.display = isReview ? "none" : "";
  persistDraft();

  if (isReview) { renderReview(); return; }

  const s = steps[currentStep];
  const val = data[s.k] ?? "";

  const wizard = document.getElementById("wizard");
  wizard.innerHTML = "";

  const card = document.createElement("div");
  card.className = "step-card active";

  let inner = `
    <div class="step-icon">${s.ic}</div>
    <div class="step-label">${s.label}</div>
    <div class="step-q">${s.q}</div>
    ${s.hint ? `<div class="step-hint">${s.hint}</div>` : ""}
  `;

  if (s.type === "text") {
    if (s.control === "date") {
      inner += `
        <div class="control-group">
          <label class="control-label" for="mainField">Date picker</label>
          <input class="field" id="mainField" type="date" value="${escHtml(toDateInputValue(val))}" />
        </div>
        <div class="field-error" id="fieldErr"></div>
      `;
    } else if (s.control === "monthRange") {
      const range = parseMonthRangeDisplay(val);
      inner += `
        <div class="control-group">
          <label class="control-label" for="rangeStart">Start month</label>
          <input class="field" id="rangeStart" type="month" value="${escHtml(range.start)}" />
        </div>
        <div class="range-grid">
          <div class="control-group">
            <label class="control-label" for="rangeEnd">End month</label>
            <input class="field" id="rangeEnd" type="month" value="${escHtml(range.end)}" ${range.present ? "disabled" : ""} />
          </div>
          <div class="control-group">
            <label class="control-label" for="rangePresent">Ongoing</label>
            <label class="range-present">
              <input id="rangePresent" type="checkbox" ${range.present ? "checked" : ""} />
              Still working here
            </label>
          </div>
        </div>
        <div class="field-error" id="fieldErr"></div>
      `;
    } else {
      inner += `
        <input class="field" id="mainField" type="text" placeholder="${s.ph ?? ""}" value="${escHtml(val)}" />
        <div class="field-error" id="fieldErr"></div>
      `;
    }
    if (s.optional) {
      inner += `<div style="margin-top:10px;"><button class="opt-btn" style="width:100%;text-align:center;color:var(--muted);" onclick="skipField()">${t("naBtn")}</button></div>`;
    }
    inner += `<div class="nav">
      ${currentStep > 0 ? `<button class="btn-back" onclick="goBack()">${t("back")}</button>` : ""}
      <button class="btn-next" onclick="goNext()">${t("next")}</button>
    </div>`;
  } else if (s.type === "opts") {
    const cols = s.opts.length <= 3 ? "single" : "";
    inner += `<div class="opts-grid ${cols}" id="optsGrid">`;
    s.opts.forEach(o => {
      const sel = val === o ? "selected" : "";
      inner += `<button class="opt-btn ${sel}" onclick="selectOpt(this,'${escHtml(o)}')">${o}</button>`;
    });
    inner += `</div>`;
    if (s.optional) inner += `<button class="opt-btn" style="width:100%;margin-top:10px;text-align:center;color:var(--muted);" onclick="skipField()">${t("naBtn")}</button>`;
    inner += `<div class="nav">
      ${currentStep > 0 ? `<button class="btn-back" onclick="goBack()">${t("back")}</button>` : ""}
      <button class="btn-next" id="nextBtn" ${!val?'disabled':''} onclick="goNext()">${t("next")}</button>
    </div>`;
  } else if (s.type === "multi") {
    const selected = val ? val.split(", ").filter(Boolean) : [];
    inner += `<div class="opts-grid" id="optsGrid">`;
    s.opts.forEach(o => {
      const sel = selected.includes(o) ? "selected" : "";
      inner += `<button class="opt-btn ${sel}" onclick="toggleMulti(this,'${escHtml(o)}')">${o}</button>`;
    });
    inner += `</div>`;
    inner += `<button class="multi-done ${selected.length>0?'show':''}" id="doneBtn" onclick="goNext()">${t("doneBtn")}</button>`;
    inner += `<div class="nav">
      ${currentStep > 0 ? `<button class="btn-back" onclick="goBack()">${t("back")}</button>` : ""}
    </div>`;
  } else if (s.type === "files") {
    const filesHtml = attachments.length
      ? attachments.map(att => `
          <div class="attachment-row">
            <div class="attachment-meta">
              <div class="attachment-name">${escHtml(att.name)}</div>
              <div class="attachment-info">${formatFileSize(att.size)} · ${escHtml(att.type || "file")}</div>
            </div>
            <button class="attachment-remove" type="button" onclick="removeAttachment('${att.id}')">Remove</button>
          </div>
        `).join("")
      : `<div class="attachment-empty">No files uploaded yet.</div>`;

    inner += `
      <div class="upload-zone" id="uploadZone" tabindex="0" role="button" aria-label="Upload additional documents">
        <div class="upload-zone-head">
          <div class="upload-zone-ic">📎</div>
          <div>
            <div class="upload-zone-title">Add supporting documents</div>
            <div class="upload-zone-copy">Drop files here or choose them from your device. You can upload more than one file.</div>
          </div>
        </div>
        <div class="upload-zone-actions">
          <button class="upload-zone-btn" id="pickDocsBtn" type="button">Choose files</button>
          ${attachments.length ? `<button class="upload-zone-btn" id="clearDocsBtn" type="button">Clear all</button>` : ""}
        </div>
        <div class="upload-note">Files stay in this browser tab until you submit. Refreshing clears them.</div>
        <input type="file" id="attachmentInput" hidden multiple />
      </div>
      <div class="attachment-list" id="attachmentList">
        ${filesHtml}
      </div>
      <div class="nav">
        ${currentStep > 0 ? `<button class="btn-back" onclick="goBack()">${t("back")}</button>` : ""}
        <button class="btn-next" onclick="goNext()">${t("next")}</button>
      </div>
    `;
  }

  card.innerHTML = inner;
  wizard.appendChild(card);

  // Focus text input
  if (s.type === "text") {
    const mainField = document.getElementById("mainField");
    const rangeStart = document.getElementById("rangeStart");
    const rangeEnd = document.getElementById("rangeEnd");
    const rangePresent = document.getElementById("rangePresent");

    if (s.control === "date" && mainField) {
      setTimeout(() => mainField.focus(), 100);
      mainField.addEventListener("change", () => {
        setDraftValue(s.k, mainField.value ? formatDateDisplay(mainField.value) : "");
      });
      mainField.addEventListener("keydown", e => { if (e.key === "Enter") goNext(); });
    } else if (s.control === "monthRange") {
      const syncRange = () => {
        const present = Boolean(rangePresent?.checked);
        if (rangeEnd) rangeEnd.disabled = present;
        const formatted = formatMonthRangeDisplay(rangeStart?.value ?? "", rangeEnd?.value ?? "", present);
        setDraftValue(s.k, formatted);
      };

      rangeStart?.addEventListener("change", syncRange);
      rangeEnd?.addEventListener("change", syncRange);
      rangePresent?.addEventListener("change", syncRange);
      setTimeout(() => rangeStart?.focus(), 100);
    } else if (mainField) {
      setTimeout(() => mainField.focus(), 100);
      mainField.addEventListener("input", () => {
        setDraftValue(s.k, mainField.value);
      });
      mainField.addEventListener("keydown", e => { if (e.key === "Enter") goNext(); });
    }
  } else if (s.type === "files") {
    const attachmentInput = document.getElementById("attachmentInput");
    const uploadZone = document.getElementById("uploadZone");
    const pickDocsBtn = document.getElementById("pickDocsBtn");
    const clearDocsBtn = document.getElementById("clearDocsBtn");

    const openPicker = () => attachmentInput?.click();

    uploadZone?.addEventListener("click", openPicker);
    uploadZone?.addEventListener("keydown", e => {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        openPicker();
      }
    });
    uploadZone?.addEventListener("dragover", e => {
      e.preventDefault();
      uploadZone.classList.add("dragover");
    });
    uploadZone?.addEventListener("dragleave", () => uploadZone.classList.remove("dragover"));
    uploadZone?.addEventListener("drop", async e => {
      e.preventDefault();
      uploadZone.classList.remove("dragover");
      try {
        const added = await addAttachments(e.dataTransfer?.files);
        if (added.length) {
          setStatusMessage(`Added ${added.length} file${added.length > 1 ? "s" : ""}.`, "success");
        }
        render();
      } catch (err) {
        setStatusMessage(`Could not add files: ${err.message}`, "error");
      }
    });

    pickDocsBtn?.addEventListener("click", e => {
      e.stopPropagation();
      openPicker();
    });
    clearDocsBtn?.addEventListener("click", e => {
      e.stopPropagation();
      clearAttachments();
    });
    attachmentInput?.addEventListener("change", async e => {
      const files = e.target.files;
      if (!files || !files.length) return;
      try {
        const added = await addAttachments(files);
        if (added.length) {
          setStatusMessage(`Added ${added.length} file${added.length > 1 ? "s" : ""}.`, "success");
        }
        render();
      } catch (err) {
        setStatusMessage(`Could not add files: ${err.message}`, "error");
      } finally {
        if (attachmentInput) attachmentInput.value = "";
      }
    });
  }
}

function renderReview() {
  const steps = getSteps();
  const wizard = document.getElementById("wizard");
  wizard.innerHTML = "";
  const card = document.createElement("div");
  card.className = "step-card active";

  const sections = [
    { title: TR.en.reviewSections.personal, keys: ["agency","name","dob","nationality","country","city","phone","email"] },
    { title: TR.en.reviewSections.job,      keys: ["jobType","workArrange","availability","salary","experience"] },
    { title: TR.en.reviewSections.experience, keys: ["job1Title","job1Company","job1Dates","job2Title","job2Company","job2Dates","job3Title","job3Company","job3Dates"] },
    { title: TR.en.reviewSections.skills,   keys: ["skills","certs","education","languages"] },
  ];

  let html = `
    <div class="step-icon">📋</div>
    <div class="step-q">${t("reviewTitle")}</div>
    <div class="step-hint">${t("reviewHint")} ${t("editHint")}</div>
  `;

  sections.forEach(sec => {
    const rows = sec.keys.map(k => {
      const s = steps.find(x=>x.k===k);
      if (!s) return "";
      const v = data[k];
      if (!v && s.optional) return "";
      return `<div class="review-row" onclick="editField('${k}')">
        <span class="review-ic">${s.ic}</span>
        <span class="review-lb">${s.label}</span>
        <span class="review-val">${escHtml(v||"—")}</span>
        <span class="review-edit">Edit</span>
      </div>`;
    }).join("");
    if (!rows.trim()) return;
    html += `<div class="review-section">
      <div class="review-section-title">${sec.title}</div>
      ${rows}
    </div>`;
  });

  if (attachments.length) {
    html += `<div class="review-section">
      <div class="review-section-title">${TR.en.reviewSections.documents}</div>
      <div class="review-row" onclick="goToDocumentsStep()">
        <span class="review-ic">📎</span>
        <span class="review-lb">Files</span>
        <span class="review-val">${attachments.length} file${attachments.length > 1 ? "s" : ""} attached</span>
        <span class="review-edit">Edit</span>
      </div>
      <div style="margin-top:10px; display:grid; gap:8px;">
        ${attachments.map(att => `
          <div class="attachment-row" style="cursor:default;">
            <div class="attachment-meta">
              <div class="attachment-name">${escHtml(att.name)}</div>
              <div class="attachment-info">${formatFileSize(att.size)} · ${escHtml(att.type || "file")}</div>
            </div>
          </div>
        `).join("")}
      </div>
    </div>`;
  }

  html += `<button class="btn-submit" onclick="submitResume()">${t("submit")}</button>`;
  html += `<div class="nav"><button class="btn-back" onclick="goBack()">${t("back")}</button></div>`;

  card.innerHTML = html;
  wizard.appendChild(card);
}

// ── Actions ───────────────────────────────────────────────────────────────────
function selectOpt(btn, val) {
  btn.closest(".opts-grid").querySelectorAll(".opt-btn").forEach(b => b.classList.remove("selected"));
  btn.classList.add("selected");
  const s = getSteps()[currentStep];
  data[s.k] = val;
  persistDraft();
  const nb = document.getElementById("nextBtn");
  if (nb) nb.disabled = false;
}

function toggleMulti(btn, val) {
  btn.classList.toggle("selected");
  const s = getSteps()[currentStep];
  const selected = Array.from(btn.closest(".opts-grid").querySelectorAll(".opt-btn.selected")).map(b => b.textContent.trim());
  data[s.k] = selected.join(", ");
  persistDraft();
  const db = document.getElementById("doneBtn");
  if (db) { db.classList.toggle("show", selected.length > 0); }
}

function skipField() {
  const s = getSteps()[currentStep];
  data[s.k] = "";
  persistDraft();
  advance();
}

function goNext() {
  const steps = getSteps();
  if (currentStep >= steps.length) return;
  const s = steps[currentStep];

  if (s.type === "text") {
    const field = document.getElementById("mainField");
    const rangeStart = document.getElementById("rangeStart");
    const rangeEnd = document.getElementById("rangeEnd");
    const rangePresent = document.getElementById("rangePresent");
    const errEl = document.getElementById("fieldErr");

    if (s.control === "date") {
      const iso = field?.value ?? "";
      if (!iso && !s.optional) { showErr(errEl, t("errRequired")); return; }
      if (iso) {
        if (!validateCalendarDate(iso)) { showErr(errEl, t("errDob")); return; }
        const parts = parseDateParts(iso);
        const currentYear = new Date().getFullYear();
        if (!parts || parts.year < 1920 || parts.year > currentYear - 10) {
          showErr(errEl, t("errDob"));
          return;
        }
      }
      data[s.k] = iso ? formatDateDisplay(iso) : "";
    } else if (s.control === "monthRange") {
      const start = rangeStart?.value ?? "";
      const end = rangeEnd?.value ?? "";
      const present = Boolean(rangePresent?.checked);
      if (!start && !s.optional) { showErr(errEl, t("errRequired")); return; }
      if (!present && !end && !s.optional) { showErr(errEl, t("errRequired")); return; }
      if (start && !parseMonthInputValue(start)) { showErr(errEl, t("errDate")); return; }
      if (!present && end && !parseMonthInputValue(end)) { showErr(errEl, t("errDate")); return; }
      data[s.k] = formatMonthRangeDisplay(start, end, present);
      if (!data[s.k] && !s.optional) { showErr(errEl, t("errDate")); return; }
    } else {
      const val = field?.value.trim() ?? "";
      if (!val && !s.optional) { showErr(errEl, t("errRequired")); return; }
      if (val && s.validate) {
        const err = validateField(s.validate, val);
        if (err) { showErr(errEl, err); return; }
      }
      data[s.k] = val;
    }
  } else if (s.type === "multi") {
    if (!data[s.k] || !data[s.k].trim()) return;
  } else if (s.type === "opts") {
    if (!data[s.k]) return;
  }

  if (editingKey) { editingKey = null; currentStep = steps.length; render(); return; }
  advance();
}

function advance() {
  const steps = getSteps();
  currentStep++;
  // Skip job2/job3 company+dates if title is blank
  while (currentStep < steps.length) {
    const s = steps[currentStep];
    if (s.k === "job2Company" || s.k === "job2Dates") {
      if (!data["job2Title"]) { currentStep++; continue; }
    }
    if (s.k === "job3Title" && !data["job2Title"]) { currentStep++; continue; }
    if (s.k === "job3Company" || s.k === "job3Dates") {
      if (!data["job3Title"]) { currentStep++; continue; }
    }
    break;
  }
  render();
  window.scrollTo(0,0);
}

function goBack() {
  if (editingKey) { editingKey = null; currentStep = getSteps().length; render(); return; }
  if (currentStep > 0) { currentStep--; render(); window.scrollTo(0,0); }
}

function editField(key) {
  const steps = getSteps();
  const idx = steps.findIndex(s => s.k === key);
  if (idx < 0) return;
  editingKey = key;
  currentStep = idx;
  render();
  window.scrollTo(0,0);
}

function goToDocumentsStep() {
  const idx = getSteps().findIndex(s => s.k === "documents");
  if (idx < 0) return;
  editingKey = null;
  currentStep = idx;
  render();
  window.scrollTo(0,0);
}

function showErr(el, msg) {
  el.textContent = msg;
  el.classList.add("show");
  document.querySelectorAll(".field").forEach(field => field.classList.add("error"));
}

function changeLang(l) {
  lang = l;
  persistDraft();
  render();
}

// ── OCR Autofill ─────────────────────────────────────────────────────────────
function cleanOcrLine(line) {
  return String(line ?? "").replace(/[•●▪·]/g, " ").replace(/\s+/g, " ").trim();
}

function normalizeOcrText(text) {
  return String(text ?? "").replace(/\r/g, "").replace(/\u00A0/g, " ");
}

function isLikelyHeading(line) {
  const value = cleanOcrLine(line).toLowerCase();
  if (!value || value.length > 40) return false;
  const headings = [
    "summary",
    "profile",
    "objective",
    "contact",
    "personal details",
    "experience",
    "work experience",
    "employment history",
    "professional experience",
    "skills",
    "education",
    "languages",
    "certifications",
    "certification",
    "licenses",
    "licences",
    "projects",
    "references",
  ];
  return headings.some(h => value === h || value.startsWith(h + " ") || value.endsWith(" " + h));
}

function extractInlineValue(text, regexes) {
  for (const regex of regexes) {
    const match = String(text).match(regex);
    if (match) return cleanOcrLine(match[1] || match[2] || "");
  }
  return "";
}

function extractSectionLines(lines, headingRegexes) {
  const startIndex = lines.findIndex(line => headingRegexes.some(re => re.test(line)));
  if (startIndex < 0) return [];
  const out = [];
  for (let i = startIndex + 1; i < lines.length; i++) {
    const line = cleanOcrLine(lines[i]);
    if (!line) continue;
    if (out.length && isLikelyHeading(line)) break;
    out.push(line);
  }
  return out;
}

function extractSectionValue(lines, headingRegexes, joiner = ", ", limit = 6) {
  const section = extractSectionLines(lines, headingRegexes);
  if (!section.length) return "";
  return section.slice(0, limit).map(cleanOcrLine).filter(Boolean).join(joiner).replace(/\s*,\s*/g, ", ").trim();
}

function normalizePhone(raw) {
  const value = String(raw ?? "").trim();
  if (!value) return "";
  const digits = value.replace(/[^\d+]/g, "");
  return digits.replace(/(?!^)\+/g, "");
}

function extractEmail(text) {
  const match = String(text).match(/[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}/);
  return match ? match[0] : "";
}

function extractPhone(text) {
  const labeled = extractInlineValue(text, [
    /(?:phone|mobile|tel|contact)\s*[:\-]?\s*(\+?\d[\d\s().-]{6,}\d)/i,
  ]);
  if (labeled) return normalizePhone(labeled);
  const match = String(text).match(/(\+?\d[\d\s().-]{6,}\d)/);
  return match ? normalizePhone(match[1]) : "";
}

function looksLikeName(line) {
  const value = cleanOcrLine(line).replace(/[,:;|]+$/g, "");
  if (!value || value.length < 4 || value.length > 60) return false;
  if (/\d/.test(value)) return false;
  if (/(resume|curriculum vitae|curriculum|cv|profile|objective|summary|experience|education|skills|contact|phone|email|address|languages|nationality|dob|date of birth)/i.test(value)) return false;
  const words = value.split(/\s+/);
  if (words.length < 2 || words.length > 5) return false;
  return words.every(word => /^[A-Za-zÀ-ÿ'’.-]+$/.test(word));
}

function extractLikelyName(lines) {
  for (const line of lines.slice(0, 10)) {
    const clean = cleanOcrLine(line);
    if (looksLikeName(clean)) return clean;
  }
  return "";
}

function normalizeMonthRangeText(value) {
  const clean = cleanOcrLine(value);
  const match = clean.match(/^([A-Za-z]{3,9})\s+(\d{4})\s*[–-]\s*(Present|Current|Now|([A-Za-z]{3,9})\s+(\d{4}))$/i);
  if (!match) return "";
  const startMonth = monthNameToNumber(match[1]);
  const startYear = Number(match[2]);
  if (!startMonth || !startYear) return "";

  if (/present|current|now/i.test(match[3])) {
    return `${monthNumberToName(startMonth)} ${startYear} – Present`;
  }

  const endMonth = monthNameToNumber(match[4]);
  const endYear = Number(match[5]);
  if (!endMonth || !endYear) return "";
  return `${monthNumberToName(startMonth)} ${startYear} – ${monthNumberToName(endMonth)} ${endYear}`;
}

function extractDob(text) {
  const labeled = extractInlineValue(text, [
    /(?:date of birth|dob|birth date)\s*[:\-]?\s*([^\n]+)/i,
  ]);

  const candidates = [];
  if (labeled) candidates.push(labeled);

  const matches = [...String(text).matchAll(/(\d{1,2}[\s\/\-][A-Za-z]{3,9}[\s\/\-]\d{4}|\d{4}[\s\/\-]\d{1,2}[\s\/\-]\d{1,2}|\d{1,2}[\s\/\-]\d{1,2}[\s\/\-]\d{4})/g)];
  matches.forEach(match => candidates.push(match[1]));

  const currentYear = new Date().getFullYear();
  for (const candidate of candidates) {
    const parts = parseDateParts(candidate);
    if (!parts) continue;
    if (parts.year < 1920 || parts.year > currentYear - 10) continue;
    if (!validateCalendarDate(`${parts.year}-${pad2(parts.month)}-${pad2(parts.day)}`)) continue;
    return formatDateDisplay(candidate);
  }

  return "";
}

function extractExperienceFields(lines) {
  const section = extractSectionLines(lines, [
    /^work experience$/i,
    /^professional experience$/i,
    /^employment history$/i,
    /^experience$/i,
  ]);
  if (!section.length) return {};
  const searchLines = section;

  for (let i = 0; i < searchLines.length; i++) {
    const dateLine = normalizeMonthRangeText(searchLines[i]);
    if (!dateLine) continue;

    const prior = searchLines.slice(Math.max(0, i - 3), i).map(cleanOcrLine).filter(Boolean);
    return {
      job1Title: prior.length >= 2 ? prior[prior.length - 2] : (prior[0] || ""),
      job1Company: prior[prior.length - 1] || "",
      job1Dates: dateLine,
    };
  }

  return {};
}

function applyOcrAutofill(text) {
  const normalized = normalizeOcrText(text);
  const lines = normalized.split(/\n+/).map(cleanOcrLine).filter(Boolean);
  const joined = lines.join(" ");
  const filled = [];

  const maybeSet = (key, value) => {
    const cleaned = cleanOcrLine(value);
    if (!cleaned) return;
    if (data[key] && String(data[key]).trim()) return;
    data[key] = cleaned;
    filled.push(key);
  };

  maybeSet("name", extractLikelyName(lines));
  maybeSet("email", extractEmail(joined));
  maybeSet("phone", extractPhone(joined));
  maybeSet("dob", extractDob(joined));
  maybeSet("nationality", extractInlineValue(joined, [/nationality\s*[:\-]?\s*([^\n]+)/i]));
  maybeSet("country", extractInlineValue(joined, [/(?:country|current country)\s*[:\-]?\s*([^\n]+)/i]));
  maybeSet("city", extractInlineValue(joined, [/(?:city|town)\s*[:\-]?\s*([^\n]+)/i]));
  maybeSet("skills", extractSectionValue(lines, [/^skills$/i, /^core skills$/i, /^technical skills$/i]));
  maybeSet("certs", extractSectionValue(lines, [/^certifications$/i, /^certification$/i, /^licenses$/i, /^licences$/i]));
  maybeSet("education", extractSectionValue(lines, [/^education$/i, /^academic background$/i, /^qualifications$/i], " ", 3));
  maybeSet("languages", extractSectionValue(lines, [/^languages$/i], ", ", 5));

  const experience = extractExperienceFields(lines);
  maybeSet("job1Title", experience.job1Title);
  maybeSet("job1Company", experience.job1Company);
  maybeSet("job1Dates", experience.job1Dates);

  persistDraft();
  return filled;
}

let tesseractLoadPromise = null;

function ensureTesseractReady() {
  if (window.Tesseract) return Promise.resolve();
  if (tesseractLoadPromise) return tesseractLoadPromise;

  tesseractLoadPromise = new Promise((resolve, reject) => {
    const script = document.createElement("script");
    script.src = "https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js";
    script.async = true;
    script.onload = () => resolve();
    script.onerror = () => reject(new Error("Unable to load the OCR engine."));
    document.head.appendChild(script);
  });

  return tesseractLoadPromise;
}

async function openOcrImport() {
  const fileInput = document.getElementById("ocrFile");
  setStatusMessage("Loading the free OCR engine...");
  ensureTesseractReady().catch(err => {
    setStatusMessage(`OCR is not available right now: ${err.message}`, "error");
  });

  if (fileInput) {
    fileInput.value = "";
    fileInput.click();
  }
}

async function handleOcrFile(event) {
  const file = event.target.files?.[0];
  if (!file) return;

  const btn = document.getElementById("importBtn");
  const fileInput = document.getElementById("ocrFile");
  try {
    await ensureTesseractReady();
  } catch (err) {
    setStatusMessage(`OCR is not available right now: ${err.message}`, "error");
    if (fileInput) fileInput.value = "";
    return;
  }

  if (btn) btn.disabled = true;
  setStatusMessage("Reading your resume locally with free OCR. This can take a moment...");

  try {
    const result = await Tesseract.recognize(file, "eng", {
      logger: m => {
        if (!m || typeof m.progress !== "number") return;
        const pct = Math.max(0, Math.min(100, Math.round(m.progress * 100)));
        if (m.status) {
          setStatusMessage(`Reading your resume locally with free OCR... ${pct}%`);
        }
      },
    });

    const filled = applyOcrAutofill(result.data.text || "");
    render();

    if (filled.length) {
      const labels = filled.map(key => getSteps().find(s => s.k === key)?.label || key);
      setStatusMessage(`Autofilled ${filled.length} field${filled.length > 1 ? "s" : ""}: ${labels.join(", ")}. Please review before continuing.`, "success");
    } else {
      setStatusMessage("OCR finished, but it did not find enough fields to autofill. You can keep filling manually.", "info");
    }
  } catch (err) {
    setStatusMessage(`OCR failed: ${err.message}`, "error");
  } finally {
    if (btn) btn.disabled = false;
    if (fileInput) fileInput.value = "";
  }
}

// ── Submit ─────────────────────────────────────────────────────────────────────
async function submitResume() {
  const btn = document.querySelector(".btn-submit");
  if (btn) btn.disabled = true;

  const loadingEl = document.getElementById("loading");
  const loadingMsg = document.getElementById("loadingMsg");
  loadingMsg.textContent = attachments.length
    ? `${t("submitting")} Uploading ${attachments.length} document${attachments.length > 1 ? "s" : ""}...`
    : t("submitting");
  loadingEl.classList.add("show");

  try {
    const formData = new FormData();
    formData.append("payload", JSON.stringify({ data, lang }));
    for (let index = 0; index < attachments.length; index += 1) {
      const attachment = attachments[index];
      if (!attachment.file) {
        throw new Error(`Missing file data for ${attachment.name || `attachment-${index + 1}`}.`);
      }
      formData.append("attachments", attachment.file, attachment.name || `attachment-${index + 1}`);
    }

    const res = await fetch("/submit", {
      method: "POST",
      body: formData,
    });
    const json = await res.json();
    loadingEl.classList.remove("show");
    if (json.ok) {
      lastSubmitResult = json;
      showSuccess(json);
    } else {
      alert("Submission failed: " + (json.error || "Unknown error"));
      if (btn) btn.disabled = false;
    }
  } catch(err) {
    loadingEl.classList.remove("show");
    alert("Network error. Please try again.");
    if (btn) btn.disabled = false;
  }
}

function showSuccess(result = {}) {
  clearDraft();
  attachments = [];
  document.getElementById("progressWrap").style.display = "none";
  setStatusMessage("");
  const wizard = document.getElementById("wizard");
  wizard.innerHTML = "";
  const card = document.createElement("div");
  card.className = "step-card active";
  const links = [];
  if (result.localUrl) {
    links.push(`<a class="success-link" href="${escHtml(encodeURI(result.localUrl))}" target="_blank" rel="noopener">Open local resume</a>`);
  }
  if (result.pdfUrl) {
    links.push(`<a class="success-link secondary" href="${escHtml(encodeURI(result.pdfUrl))}" target="_blank" rel="noopener">Open Supabase copy</a>`);
  }
  const attachmentsNote = result.attachmentCount
    ? `<div class="success-msg" style="margin-top:16px;">${result.attachmentCount} additional document${result.attachmentCount > 1 ? "s" : ""} saved.</div>`
    : "";
  const mirrorNote = result.mirrorError ? `<div class="success-msg" style="margin-top:16px;">Mirror note: ${escHtml(result.mirrorError)}</div>` : "";
  card.innerHTML = `
    <div class="success-screen">
      <span class="success-icon">🎉</span>
      <div class="success-title">${t("successTitle", data.name?.split(" ")[0] || "")}</div>
      <div class="success-msg">${t("successMsg", data.agency || "the agency").replace(/\n/g,"<br>")}</div>
      ${links.length ? `<div class="success-links">${links.join("")}</div>` : ""}
      ${attachmentsNote}
      ${mirrorNote}
    </div>
  `;
  wizard.appendChild(card);
}

function escHtml(str) {
  return String(str ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ── Init ──────────────────────────────────────────────────────────────────────
restoreDraft();
if (currentStep < 0 || currentStep > getSteps().length) currentStep = 0;
